<svg xmlns="http://www.w3.org/2000/svg" width="240" height="64" viewBox="0 0 240 64">
  <defs>
    <filter id="glow-outer" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="glow-mid" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.3" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="glow-inner" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.1" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>
  <g transform="translate(32,32)">
    <circle cx="0" cy="0" r="18.9" fill="none" stroke="#e0447d" stroke-width="2.5" filter="url(#glow-outer)" />
    <circle cx="0" cy="0" r="13.6" fill="none" stroke="#1fa3d1" stroke-width="1.8" filter="url(#glow-mid)" />
    <circle cx="0" cy="0" r="8.7" fill="none" stroke="#7a63e6" stroke-width="1.15" filter="url(#glow-inner)" />
  </g>
  <text x="66" y="40" font-family="'Space Grotesk', system-ui, sans-serif" font-size="26" font-weight="600" letter-spacing="-0.3" fill="#1a1b20">Glowbraid</text>
</svg>
